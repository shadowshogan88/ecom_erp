{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="py-12 lg:py-16">
  <div class="mx-auto max-w-md px-4 lg:px-8">
    <div class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-gray-950 lg:p-8">
      <h1 class="font-display text-2xl font-bold text-gray-900 dark:text-white">Login</h1>
      <p class="mt-2 text-gray-600 dark:text-gray-400">Welcome back.</p>

      {% if form.errors %}
        <div class="mt-6 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 dark:border-red-900/50 dark:bg-red-900/20 dark:text-red-200">
          Please check your credentials and try again.
        </div>
      {% endif %}

      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">Username</label>
          <input name="username" type="text" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
          <input name="password" type="password" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
        </div>
        <button type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-primary-600 px-6 py-3 font-semibold text-white transition-colors hover:bg-primary-700">
          Login
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
        New here? <a href="{% url 'users:register' %}" class="font-semibold text-primary-600 hover:text-primary-700">Create an account</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
